services:
  - type: web
    name: nanolab-booking
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: APP_TZ
        value: Africa/Johannesburg
      - key: ADMIN_FURNACE_EMAIL
        sync: false
      - key: ADMIN_FURNACE_PASSWORD
        sync: false
      - key: ADMIN_XPS_EMAIL
        sync: false
      - key: ADMIN_XPS_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USE_TLS
        value: 'true'
