services:
  - type: web
    name: u2acn2-nanolab-portal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 2 --timeout 60
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: APP_TZ
        value: Africa/Johannesburg
      - key: SLOT_MINUTES
        value: "60"

      # ── SMTP (fill in on Render dashboard) ──
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_FROM_NAME
        value: "U2ACN2 Nanolab Portal"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""

      # ── Chemical Inventory ──
      - key: CHEM_ADMIN_PASSWORD
        value: "changeme"
      - key: CHEM_ADMIN_EMAIL
        value: ""
      - key: PURCHASE_NOTIFY_EMAILS
        value: ""

      # ── Per-lab admin credentials ──
      # Replace LABSLUG with: FURNACE, XPS, MANUAL_DRYING_OVEN, etc.
      # - key: ADMIN_FURNACE_USERNAME
      #   value: admin
      # - key: ADMIN_FURNACE_PASSWORD
      #   value: changeme
