<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Chemical Admin Login — U2ACN2 Nanolab</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    .login-wrap { max-width:380px; margin:4rem auto; }
    .login-wrap h2 { margin:0 0 .3rem; }
    .login-wrap p  { color:var(--muted); margin:0 0 1.5rem; font-size:.9rem; }
    .field { margin-bottom:.9rem; }
    .field label { display:block; font-size:.85rem; font-weight:600; margin-bottom:.3rem; }
    .field input {
      width:100%; padding:.65rem .85rem; border:1.5px solid var(--border);
      border-radius:8px; font-size:.95rem; background:var(--card-bg); color:var(--text);
      box-sizing:border-box; transition:border-color .2s;
    }
    .field input:focus { outline:none; border-color:var(--accent); }
    .btn-login {
      width:100%; padding:.75rem; background:var(--accent); color:#fff;
      border:none; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer;
    }
    .flash.error { background:#fce4ec; color:#c62828; border:1px solid #ef9a9a;
                   border-radius:8px; padding:.7rem 1rem; margin-bottom:1rem; font-size:.9rem; }
  </style>
</head>
<body>
<header class="topbar">
  <div class="container">
    <h1 style="font-size:1.2rem;margin:0;color:#fff;">🔐 Chemical Inventory Admin</h1>
  </div>
</header>
<main class="container">
  <div class="login-wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <div class="card">
      <h2>Admin Login</h2>
      <p>Enter the chemical inventory admin password to continue.</p>
      <form method="post">
        <input type="hidden" name="next" value="{{ next }}"/>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" autofocus required/>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
    </div>
    <p style="text-align:center;margin-top:1rem;">
      <a href="/chemicals" style="color:var(--muted);font-size:.85rem;">← Back to Inventory</a>
    </p>
  </div>
</main>
</body>
</html>
