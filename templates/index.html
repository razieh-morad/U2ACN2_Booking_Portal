<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>U2ACN2 Nanolab Booking Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h1>U2ACN2 Nanolab Booking Portal</h1>
      <p class="sub">UNESCO-UNISA-iTL/NRF Chair</p>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h2>Labs</h2>
      <div class="grid">
        {% for lab in labs %}
          {% if lab.slug == 'furnace' %}
            <a class="lab" href="{{ url_for('furnace') }}">
          {% elif lab.slug == 'xps' %}
            <a class="lab" href="{{ url_for('xps') }}">
          {% else %}
            <a class="lab" href="{{ url_for('lab_generic', lab_slug=lab.slug) }}">
          {% endif %}
              <div class="lab-title">{{ lab.title }}</div>
              <div class="lab-sub">{{ lab.subtitle }}</div>
              <div class="lab-cta">Open →</div>
            </a>
        {% endfor %}
      </div>
    </div>

    <div class="hint">
      Admin: go to <span class="muted">/admin/&lt;lab-slug&gt;</span> (each lab has its own login).
    </div>
  </main>
</body>
</html>
